<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    .hero {
      width: 100%;
      height: 400px;
      display: flex;
    }

    .cover-hero {
      position: relative;
      width: 60%;
      background-color: red;
    }

    .gallery-hero {
      position: relative;
      width: 40%;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 10px;
      background-color: yellowgreen;
      padding: 10px;
      box-sizing: border-box;
      height: 100%; /* ocupar todo el alto del hero */
    }

    .gallery-hero div {
      /* background-color: gray; */
      width: 100%;
      height: 100%; /* que ocupe toda la celda */
    }

    .box1 { background-color: #f15a24; }
    .box2 { background-color: #8dc63f; }
    .box3 { background-color: #3498db; }
    .box4 { background-color: #9b59b6; }
  </style>
</head>
<body>
  <section class="hero">
    <article class="cover-hero">
      <!-- Contenido de cover -->
    </article>
    <article class="gallery-hero">
      <div class="box1"></div>
      <div class="box2"></div>
      <div class="box3"></div>
      <div class="box4"></div>
    </article>
  </section>
</body>
</html>
