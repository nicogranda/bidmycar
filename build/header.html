<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Header BidMyCar</title>
  <style>
    :root {
      --color-primary: #F15A24;
      --font-primary: Roboto, sans-serif;
    }

    * {
      box-sizing: border-box;
      width: 95%;
      margin: 0 auto;
    }

    body {
      margin: 0;
      font-family: var(--font-primary);
    }

    header {
      background-color: white;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      display: flex;
      justify-content: center;
    }

    .header-inner {
      width: 100%;
      max-width: 1200px;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-weight: bold;
      font-size: 1.4rem;
      color: var(--color-primary);
      text-decoration: none;
    }

    nav {
      display: flex;
      gap: 1rem;
    }

    nav a {
      text-decoration: none;
      color: #333;
      font-weight: 500;
      font-size: 0.95rem;
      white-space: nowrap;
    }

    .search-signup {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .search-bar {
      padding: 0.4rem 1rem;
      border: 1px solid #ccc;
      border-radius: 20px;
      outline: none;
      width: 150px;
    }

    .signup-btn {
      padding: 0.4rem 1rem;
      background-color: var(--color-primary);
      color: white;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-weight: bold;
    }

    .burger {
      display: none;
      flex-direction: column;
      cursor: pointer;
      gap: 4px;
    }

    .burger div {
      width: 25px;
      height: 3px;
      background-color: #333;
    }

    .mobile-nav {
      display: none;
      flex-direction: column;
      gap: 1rem;
      background: white;
      padding: 1rem;
      position: absolute;
      top: 70px;
      left: 0;
      width: 100%;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    @media (max-width: 768px) {
      nav {
        display: none;
      }

      .burger {
        display: flex;
      }

      .mobile-nav.show {
        display: flex;
      }

      .search-bar {
        width: 100px;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-inner">
      <a href="#" class="logo">BidMyCar</a>

      <nav class="desktop-nav">
        <a href="#">Subasta</a>
        <a href="#">Vende un Coche</a>
        <a href="#">Comunidad</a>
        <a href="#">¿Qué es BidMyCar?</a>
        <a href="#">E-mail News</a>
      </nav>

      <div class="search-signup">
        <input type="text" class="search-bar" placeholder="Buscar...">
        <button class="signup-btn">Sign Up</button>
        <div class="burger" onclick="toggleMenu()">
          <div></div>
          <div></div>
          <div></div>
        </div>
      </div>
    </div>

    <div class="mobile-nav" id="mobileNav">
      <a href="#">Subasta</a>
      <a href="#">Vende un Coche</a>
      <a href="#">Comunidad</a>
      <a href="#">¿Qué es BidMyCar?</a>
      <a href="#">E-mail News</a>
    </div>
  </header>

  <div style="padding-top: 100px; height: 2000px;">
    <p>Contenido de ejemplo para scroll.</p>
  </div>

  <script>
    function toggleMenu() {
      const mobileNav = document.getElementById("mobileNav");
      mobileNav.classList.toggle("show");
    }
  </script>

</body>
</html>
