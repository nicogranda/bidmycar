<style>
    .filter {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      align-items: center;
      font-family: var(--font-primary, Roboto);
      padding: 1rem;
      background-color: rgba(241, 90, 36, 0.05); /* fondo suave con --color-primary */
      border-radius: 1rem;
    }
  
    .filter strong {
      font-size: 1.2rem;
      color: var(--color-primary);
    }
  
    .filter select,
    .filter button {
      padding: 0.5rem 1rem;
      border: 1px solid var(--color-primary);
      border-radius: 0.5rem;
      background-color: white;
      font-size: 0.95rem;
      color: var(--color-primary);
      cursor: pointer;
      transition: all 0.2s ease;
    }
  
    .filter select:focus,
    .filter button:hover {
      background-color: var(--color-primary);
      color: white;
    }
  
    .filter button {
      background-color: transparent;
    }
  </style>
  
  <div class="filter">
    <strong>Subasta</strong>
  
    <select name="year" id="year">
      <option value="">Año</option>
    </select>
  
    <select name="transmission" id="transmission">
      <option value="">Transmisión</option>
      <option value="manual">Manual</option>
      <option value="automatic">Automático</option>
    </select>
  
    <select name="style" id="style">
      <option value="">Estilo</option>
      <option value="sedan">Turismo</option>
      <option value="van">Furgoneta</option>
      <option value="truck">Camión</option>
      <option value="motorcycle">Motocicleta</option>
      <option value="bus">Bus</option>
    </select>
  
    <button name="ending_soon">Finaliza Pronto</button>
    <button name="recent">Recientes</button>
    <button name="no_reserve">Sin Reservas</button>
    <button name="lowest_mileage">Menor Kilometraje</button>
    <button name="near_me">Cerca de mí</button>
  </div>
  
  <script>
    // Generar años desde 1981 hasta el actual
    const currentYear = new Date().getFullYear();
    const yearSelect = document.getElementById("year");
    for (let y = currentYear; y >= 1981; y--) {
      const option = document.createElement("option");
      option.value = y;
      option.textContent = y;
      yearSelect.appendChild(option);
    }
  </script>
